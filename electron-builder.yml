appId: app.my2do.desktop
productName: My2Do
copyright: © My2Do

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

# Custom protocol so the OS hands `my2do://auth/callback?token=…` deep links to the app.
protocols:
  - name: My2Do
    schemes: [my2do]

mac:
  category: public.app-category.productivity
  target: [dmg, zip]        # zip is required by electron-updater's macOS feed
  icon: build/icon.png       # electron-builder generates .icns from a 512+ png
  hardenedRuntime: true
  gatekeeperAssess: false
  # entitlements: build/entitlements.mac.plist   # add when notarizing

win:
  target: [nsis]
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target: [AppImage, deb]
  category: Utility
  icon: build/icon.png
  synopsis: A calmer way to get things done — desktop.

# Auto-update feed (also the download source for the web /download page).
publish:
  provider: github
  owner: GM-Sunshine
  repo: My2Do-desktop
